name: Bug Report
description: Report a bug or unexpected behaviour in fimod
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: fimod version
      description: Output of `fimod --version`
      placeholder: "fimod 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (x86_64)
        - Linux (aarch64)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command executed
      description: The exact command you ran (redact sensitive data).
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include the full error output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mold script, input file sample, or any other relevant information.
