[molds.gh_latest]
description = "Get the latest release tag or download URL from a GitHub repository"
docs = '''
Get the latest release tag or download URL from a GitHub repository.

Usage:
  fimod s -i https://github.com/owner/repo/releases/latest -m @gh_latest
  fimod s -i https://github.com/owner/repo/releases/latest -m @gh_latest \
        --arg repo=owner/repo --arg asset=myapp-{version}-linux.tar.gz

When --arg asset is provided, returns the full download URL for that release asset.
Without it, returns the bare tag (e.g. v1.2.3).'''
path = "gh_latest/gh_latest.py"
readme = "gh_latest/README.md"
input_format = "http"
output_format = "txt"
options = ["no-follow"]

[molds.gh_latest.args]
asset = "Asset filename pattern — supports {tag} and {version} placeholders"
repo = "GitHub repository (owner/repo) — required for download URL"

