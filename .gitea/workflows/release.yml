name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

env:
  CARGO_TERM_COLOR: always
  GIT_CLIFF_VERSION: "2.8.0"
  UPX_VERSION: "5.1.0"

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache git-cliff
        id: cache-cliff
        uses: actions/cache@v3
        with:
          path: /usr/local/bin/git-cliff
          key: git-cliff-${{ env.GIT_CLIFF_VERSION }}-${{ runner.os }}

      - name: Install git-cliff
        if: steps.cache-cliff.outputs.cache-hit != 'true'
        run: |
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v${{ env.GIT_CLIFF_VERSION }}/git-cliff-${{ env.GIT_CLIFF_VERSION }}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /tmp/
          find /tmp -name 'git-cliff' -type f | head -1 | xargs -I{} cp {} /usr/local/bin/git-cliff
          chmod +x /usr/local/bin/git-cliff

      - name: Generate changelog
        run: git-cliff --config cliff.toml --latest --strip header --output CHANGELOG_RELEASE.md

      - uses: actions/upload-artifact@v3
        with:
          name: changelog
          path: CHANGELOG_RELEASE.md

  build:
    name: Build ${{ matrix.variant }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl,  ext: tar.gz, variant: default, features: "" }
          - { target: aarch64-unknown-linux-musl,  ext: tar.gz, variant: default, features: "" }
          - { target: x86_64-unknown-linux-musl,  ext: tar.gz, variant: slim,    features: "--no-default-features" }
          - { target: aarch64-unknown-linux-musl,  ext: tar.gz, variant: slim,    features: "--no-default-features" }
          - { target: x86_64-pc-windows-gnu,       ext: zip,    variant: default, features: "" }
          - { target: x86_64-pc-windows-gnu,       ext: zip,    variant: slim,    features: "--no-default-features" }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # shared-key → tous les jobs partagent le cache cargo registry
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cargo-registry"
          key: ${{ matrix.target }}-${{ matrix.variant }}

      # Cache ziglang wheel — évite le téléchargement PyPI, pip install tourne toujours
      - name: Cache ziglang
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ziglang-${{ runner.os }}

      - name: Install ziglang
        run: pip install ziglang --break-system-packages

      # Cache cargo-zigbuild binaire — compilé une seule fois
      - name: Cache cargo-zigbuild
        id: cache-zigbuild
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install cargo-zigbuild
        if: steps.cache-zigbuild.outputs.cache-hit != 'true'
        run: cargo install cargo-zigbuild --locked

      # Cache UPX binaire — version épinglée, pas de hit GitHub API après premier téléchargement
      - name: Cache UPX
        id: cache-upx
        uses: actions/cache@v3
        with:
          path: /usr/local/bin/upx
          key: upx-${{ env.UPX_VERSION }}-${{ runner.os }}

      - name: Install UPX
        if: steps.cache-upx.outputs.cache-hit != 'true'
        run: |
          curl -sSfL \
            "https://github.com/upx/upx/releases/download/v${{ env.UPX_VERSION }}/upx-${{ env.UPX_VERSION }}-amd64_linux.tar.xz" \
            | tar xJ -C /tmp/
          find /tmp -name 'upx' -type f | head -1 | xargs -I{} cp {} /usr/local/bin/upx
          chmod +x /usr/local/bin/upx

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Set binary metadata
        id: bin
        run: |
          EXT=$([[ "${{ matrix.target }}" == *windows* ]] && echo ".exe" || echo "")
          PREFIX=$([[ "${{ matrix.variant }}" == "slim" ]] && echo "fimod-slim" || echo "fimod")
          echo "ext=${EXT}"                                                                    >> "$GITHUB_OUTPUT"
          echo "path=target/${{ matrix.target }}/release/fimod${EXT}"                        >> "$GITHUB_OUTPUT"
          echo "asset=${PREFIX}-${GITHUB_REF_NAME}-${{ matrix.target }}.${{ matrix.ext }}"  >> "$GITHUB_OUTPUT"

      - name: Compress with UPX
        run: upx --best --lzma "${{ steps.bin.outputs.path }}"

      - name: Package
        run: |
          SRC="${{ steps.bin.outputs.path }}"
          if [[ "${{ matrix.ext }}" == "zip" ]]; then
            zip -j "${{ steps.bin.outputs.asset }}" "$SRC"
          else
            tar czf "${{ steps.bin.outputs.asset }}" -C "$(dirname $SRC)" "$(basename $SRC)"
          fi

      - uses: actions/upload-artifact@v3
        with:
          name: binary-${{ matrix.variant }}-${{ matrix.target }}
          path: ${{ steps.bin.outputs.asset }}

  release:
    name: Publish Gitea Release
    needs: [changelog, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v3
        with:
          path: artifacts/

      - name: Generate VERSION file
        run: echo "$GITHUB_REF_NAME" > VERSION

      - name: Bundle molds
        run: |
          if [ -d molds ] && [ "$(ls -A molds)" ]; then
            tar czf "fimod-${GITHUB_REF_NAME}-molds.tar.gz" molds/
          fi

      - name: Compute SHA256 checksums
        run: |
          SUMS="fimod-${GITHUB_REF_NAME}-sha256sums.txt"
          find artifacts/ \( -name "*.tar.gz" -o -name "*.zip" \) | sort | while read f; do
            sha256sum "$f" | awk "{print \$1, \"$(basename $f)\"}"
          done > "$SUMS"
          echo "SUMS_FILE=${SUMS}" >> "$GITHUB_ENV"

      - name: Create Gitea Release and upload assets
        env:
          TOKEN:  ${{ github.token }}
          SERVER: ${{ github.server_url }}
          REPO:   ${{ github.repository }}
          TAG:    ${{ github.ref_name }}
        run: |
          PRERELEASE=false
          [[ "$TAG" == *"-"* ]] && PRERELEASE=true

          BODY=$(cat artifacts/changelog/CHANGELOG_RELEASE.md 2>/dev/null || echo "Release $TAG")

          RELEASE_RESP=$(curl -sf -X POST \
            "${SERVER}/api/v1/repos/${REPO}/releases" \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                 --arg  tag  "$TAG" \
                 --arg  name "$TAG" \
                 --arg  body "$BODY" \
                 --argjson pre "$PRERELEASE" \
                 '{tag_name:$tag, name:$name, body:$body, prerelease:$pre}')")

          RELEASE_ID=$(echo "$RELEASE_RESP" | jq -r .id)
          echo "Release ID: ${RELEASE_ID}"

          shopt -s nullglob
          for f in artifacts/binary-*/*.tar.gz artifacts/binary-*/*.zip \
                   fimod-*-molds.tar.gz "$SUMS_FILE" VERSION; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            echo "Uploading $fname …"
            curl -sf -X POST \
              "${SERVER}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${fname}" \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done
